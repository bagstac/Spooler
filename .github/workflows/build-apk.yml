name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      # No release-signing keystore exists yet, so this ships the debug
      # build (debug-key signed). Fine for sideloading on your own device;
      # revisit if this ever needs to go through a store.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Spooler build #${{ github.run_number }}"
          body: |
            Automated debug build of ${{ github.sha }}.
          files: app/build/outputs/apk/debug/app-debug.apk
